<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>تحدي الكنبة — جرس</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E24B4A;--red-l:#FCEBEB;--red-d:#A32D2D;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-d:#185FA5;
  --gold:#EF9F27;
  --bg:#0f0f0f;--card:#1a1a1a;--border:#333;
  --text:#f0f0f0;--muted:#888;
  --input-bg:#222;--input-text:#f0f0f0;
}
html,body{width:100%;height:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

body.light{
  --bg:#f0f2f5;--card:#ffffff;--border:#c8cdd6;
  --text:#1a1a2e;--muted:#5a6275;
  --input-bg:#f8f9fb;--input-text:#1a1a2e;
}
.mode-toggle{position:fixed;top:.6rem;left:.6rem;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:.25rem .6rem;cursor:pointer;font-size:.75rem;color:var(--muted);font-family:'Tajawal',sans-serif}
/* NAME ENTRY */
#name-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:var(--bg);z-index:50}
.ns-logo{font-size:2.5rem;margin-bottom:.25rem}
.ns-title{font-size:1.8rem;font-weight:700;color:var(--gold);margin-bottom:.25rem}
.ns-sub{font-size:.9rem;color:var(--muted);margin-bottom:1.5rem}
.ns-team{font-size:.85rem;font-weight:700;padding:.4rem 1rem;border-radius:20px;display:inline-block;margin-bottom:1.5rem}
.ns-team.ta{background:var(--red-l);color:var(--red-d)}
.ns-team.tb{background:var(--blue-l);color:var(--blue-d)}
.ns-input{width:100%;max-width:280px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;padding:.85rem 1rem;font-size:1.1rem;color:var(--input-text);font-family:'Tajawal',sans-serif;outline:none;text-align:center;transition:border .15s;display:block;margin:0 auto .75rem}
.ns-input:focus{border-color:var(--gold)}
.ns-btn{width:100%;max-width:280px;padding:.85rem;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.ns-btn:hover{opacity:.88}
.ns-err{font-size:.8rem;color:var(--red);margin-top:.5rem;min-height:1.2rem}

/* LOADING */
#loading{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:var(--bg);z-index:40}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:1rem auto 0}
@keyframes spin{to{transform:rotate(360deg)}}

/* WAITING SCREEN */
#waiting-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:var(--bg);z-index:30}
.ws-icon{font-size:3rem;margin-bottom:1rem}
.ws-title{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:.5rem}
.ws-sub{font-size:.9rem;color:var(--muted);margin-bottom:1.5rem}
.ws-team{font-size:.85rem;font-weight:700;padding:.4rem 1rem;border-radius:20px;display:inline-block;margin-bottom:1rem}
.ws-team.ta{background:var(--red-l);color:var(--red-d)}
.ws-team.tb{background:var(--blue-l);color:var(--blue-d)}
.ws-name{font-size:1.1rem;font-weight:700;color:var(--text)}
.ws-dots{display:flex;gap:.4rem;justify-content:center;margin-top:1.5rem}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--border);animation:wsdot 1.2s infinite}
.ws-dot:nth-child(2){animation-delay:.2s}
.ws-dot:nth-child(3){animation-delay:.4s}
@keyframes wsdot{0%,80%,100%{background:var(--border)}40%{background:var(--gold)}}

/* PLAYER GAME */
#player{display:none;width:100%;height:100%;flex-direction:column;align-items:stretch;position:fixed;inset:0}

.p-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0}
.p-logo{font-size:1.1rem;font-weight:700;color:var(--gold)}
.p-name-badge{font-size:.8rem;font-weight:700;padding:.3rem .75rem;border-radius:20px}
.p-name-badge.ta{background:var(--red-l);color:var(--red-d)}
.p-name-badge.tb{background:var(--blue-l);color:var(--blue-d)}

.status-bar{padding:.6rem 1.25rem;background:var(--card);border-bottom:1px solid var(--border);text-align:center;font-size:.85rem;color:var(--muted);flex-shrink:0;min-height:40px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.status-bar.ready{color:var(--gold);font-weight:500}
.status-bar.buzzed-me{background:#071a04;color:#9fce60;font-weight:700}
.status-bar.buzzed-other{background:#1a0707;color:var(--red);font-weight:500}

/* BUZZER */
.buzzer-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;gap:1rem}
.buzz-btn{width:min(240px,65vw);height:min(240px,65vw);border-radius:50%;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:clamp(1.8rem,7vw,2.5rem);font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .1s,box-shadow .15s;user-select:none;-webkit-user-select:none}
.buzz-btn.ta{background:radial-gradient(circle at 35% 35%,#f07070,var(--red) 60%,var(--red-d));box-shadow:0 0 0 10px rgba(226,75,74,.12),0 8px 32px rgba(226,75,74,.4)}
.buzz-btn.tb{background:radial-gradient(circle at 35% 35%,#70a8f0,var(--blue) 60%,var(--blue-d));box-shadow:0 0 0 10px rgba(55,138,221,.12),0 8px 32px rgba(55,138,221,.4)}
.buzz-btn:active:not(.disabled){transform:scale(.92)}
.buzz-btn.disabled{filter:grayscale(.7);opacity:.45;pointer-events:none}
.buzz-btn.fired.ta{box-shadow:0 0 0 24px rgba(226,75,74,.2),0 12px 48px rgba(226,75,74,.6)}
.buzz-btn.fired.tb{box-shadow:0 0 0 24px rgba(55,138,221,.2),0 12px 48px rgba(55,138,221,.6)}
.buzz-hint{font-size:.8rem;color:var(--muted);text-align:center}

/* COUCH STATUS */
.couch-strip{border-top:1px solid var(--border);background:var(--card);padding:.75rem 1.25rem;flex-shrink:0}
.cs-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem}
.cs-teams{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.cs-team-name{font-size:.7rem;font-weight:700;margin-bottom:.3rem}
.cs-team-name.ta{color:var(--red)}
.cs-team-name.tb{color:var(--blue)}
.dots{display:flex;flex-wrap:wrap;gap:.3rem}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid}
.dot.ta{background:var(--red-l);border-color:var(--red)}
.dot.ta.out{opacity:.3;background:transparent;border-style:dashed}
.dot.tb{background:var(--blue-l);border-color:var(--blue)}
.dot.tb.out{opacity:.3;background:transparent;border-style:dashed}

/* WIN */
#win-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;z-index:100}
#win-screen.show{display:flex}
#win-screen h1{font-size:3rem;font-weight:700;color:var(--gold);margin-bottom:.5rem}
#win-screen p{color:var(--muted)}

#error{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;text-align:center;padding:2rem;flex-direction:column;gap:.75rem;z-index:200}
#error.show{display:flex}
#error h2{font-size:1.8rem;font-weight:700;color:var(--red)}
#error p{color:var(--muted);font-size:.9rem;max-width:300px;line-height:1.6}
</style>
</head>
<body>
<button class="mode-toggle" id="mode-toggle">☀️</button>

<div id="name-screen">
  <div class="ns-logo">🛋️</div>
  <div class="ns-title">تحدي الكنبة</div>
  <p class="ns-sub">أدخل اسمك للانضمام</p>
  <div class="ns-team" id="ns-team-badge">الفريق</div>
  <input class="ns-input" type="text" id="player-name-input" placeholder="اسمك" maxlength="14" autocomplete="off" autocorrect="off"/>
  <button class="ns-btn" id="join-btn">انضم للعبة</button>
  <div class="ns-err" id="ns-err"></div>
</div>

<div id="loading">
  <div style="font-size:1.3rem;font-weight:700;color:var(--gold)">جارٍ الاتصال...</div>
  <div class="spinner"></div>
</div>

<div id="waiting-screen">
  <div class="ws-icon">🛋️</div>
  <div class="ws-title">في انتظار المضيف</div>
  <p class="ws-sub">انضممت بنجاح! اللعبة ستبدأ قريباً</p>
  <div class="ws-team" id="ws-team-badge">الفريق</div>
  <div class="ws-name" id="ws-player-name"></div>
  <div class="ws-dots"><div class="ws-dot"></div><div class="ws-dot"></div><div class="ws-dot"></div></div>
</div>

<div id="player">
  <div class="p-header">
    <div class="p-logo">تحدي الكنبة</div>
    <div class="p-name-badge" id="p-name-badge">أنت</div>
  </div>
  <div class="status-bar" id="status-bar">جارٍ الاتصال...</div>
  <div class="buzzer-area">
    <button class="buzz-btn disabled" id="buzz-btn">اضغط!</button>
    <div class="buzz-hint" id="buzz-hint">انتظر السؤال...</div>
  </div>
  <div class="couch-strip">
    <div class="cs-label">حالة اللعبة</div>
    <div class="cs-teams">
      <div><div class="cs-team-name ta" id="cs-name-a">الفريق أ</div><div class="dots" id="cs-dots-a"></div></div>
      <div><div class="cs-team-name tb" id="cs-name-b">الفريق ب</div><div class="dots" id="cs-dots-b"></div></div>
    </div>
  </div>
</div>

<div id="win-screen">
  <h1 id="win-title">🏆</h1>
  <p id="win-sub">انتهت اللعبة!</p>
</div>

<div id="error">
  <h2>عذراً!</h2>
  <p id="error-msg">تعذّر الاتصال باللعبة. تأكد من أن المضيف بدأ اللعبة وحاول مرة أخرى.</p>
</div>

<script>
// ── DARK/LIGHT MODE ──
(()=>{
  const btn=document.getElementById('mode-toggle');
  const saved=localStorage.getItem('cc_mode');
  if(saved==='light'){document.body.classList.add('light');btn.textContent='🌙';}
  btn.addEventListener('click',()=>{
    const isLight=document.body.classList.toggle('light');
    btn.textContent=isLight?'🌙':'☀️';
    localStorage.setItem('cc_mode',isLight?'light':'dark');
  });
})();

const params=new URLSearchParams(window.location.search);
const GAME_ID=params.get('game');
const TEAM=params.get('team');
const PUSHER_KEY=params.get('key');
const PUSHER_CLUSTER=params.get('cluster');

if(!GAME_ID||!TEAM||!PUSHER_KEY||!PUSHER_CLUSTER){
  showError('رابط غير صالح. امسح رمز QR من شاشة المضيف مجدداً.');
}

let myName='', teamName=TEAM==='a'?'الفريق أ':'الفريق ب';
let pusher=null, channel=null;
let phase='idle', buzzLocked=false;

// ── RESTORE SESSION (player refresh) ──
const SESSION_KEY=`cc_player_${GAME_ID}`;
(()=>{
  try{
    const saved=sessionStorage.getItem(SESSION_KEY);
    if(!saved) return;
    const {name}=JSON.parse(saved);
    if(name){
      myName=name;
      document.getElementById('player-name-input').value=name;
      // Auto-join without showing name screen
      document.getElementById('name-screen').style.display='none';
      document.getElementById('loading').style.display='flex';
      connectPusher();
    }
  }catch(e){}
})();

// Set team badge on name screen
const badge=document.getElementById('ns-team-badge');
badge.className='ns-team t'+TEAM;
badge.textContent=teamName;

document.getElementById('join-btn').addEventListener('click',joinGame);
document.getElementById('player-name-input').addEventListener('keydown',e=>{if(e.key==='Enter') joinGame();});

function joinGame(){
  const name=document.getElementById('player-name-input').value.trim();
  if(!name){document.getElementById('ns-err').textContent='الرجاء إدخال اسمك';return;}
  if(name.length<2){document.getElementById('ns-err').textContent='الاسم قصير جداً';return;}
  myName=name;
  document.getElementById('name-screen').style.display='none';
  document.getElementById('loading').style.display='flex';
  connectPusher();
}

function connectPusher(){
  try{
    pusher=new Pusher(PUSHER_KEY,{cluster:PUSHER_CLUSTER});
    let hasJoined=false;
    pusher.connection.bind('connected',()=>{
      if(!channel){
        channel=pusher.subscribe(`game-${GAME_ID}`);
        channel.bind('game-state',onGameState);
        channel.bind('buzzed',onBuzzed);
        channel.bind('action',onAction);
        channel.bind('win',onWin);
        channel.bind('team-full',onTeamFull);
        channel.bind('name-taken',onNameTaken);
        channel.bind('timeout',()=>{alert('انتهت اللعبة بسبب الخمول.');sessionStorage.removeItem(SESSION_KEY);location.reload();});
        channel.bind('pusher:subscription_succeeded',()=>{
          document.getElementById('loading').style.display='none';
          showWaiting();
          try{sessionStorage.setItem(SESSION_KEY,JSON.stringify({name:myName}));}catch(e){}
          if(!hasJoined){
            hasJoined=true;
            setTimeout(()=>notifyHost('join',{team:TEAM,name:myName,gameId:GAME_ID,playerId:`${TEAM}-${myName}`}),400);
          }
        });
      } else if(hasJoined){
        // Reconnect — re-announce
        setTimeout(()=>notifyHost('join',{team:TEAM,name:myName,gameId:GAME_ID,playerId:`${TEAM}-${myName}`}),500);
      }
    });
    pusher.connection.bind('disconnected',()=>setStatus('انقطع الاتصال... جارٍ إعادة الاتصال',''));
    pusher.connection.bind('failed',()=>showError('تعذّر الاتصال بالخادم.'));
    pusher.connection.bind('unavailable',()=>setStatus('الاتصال غير متاح. تحقق من الإنترنت.',''));
  }catch(e){showError('فشل الاتصال: '+e.message);}
}

function showWaiting(){
  document.getElementById('waiting-screen').style.display='flex';
  const wb=document.getElementById('ws-team-badge');
  wb.className='ws-team t'+TEAM;
  wb.textContent=teamName;
  document.getElementById('ws-player-name').textContent=myName;
}

async function notifyHost(event,data){
  try{
    await fetch('/api/pusher',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channel:`game-${GAME_ID}`,event,data})
    });
  }catch(e){console.warn('notify failed',e);}
}

function onGameState(data){
  if(data.gameId!==GAME_ID) return;

  // Show game screen (switch from waiting)
  document.getElementById('waiting-screen').style.display='none';
  document.getElementById('player').style.display='flex';

  // Update real team names
  if(data.names){
    teamName=TEAM==='a'?data.names.a:data.names.b;
    document.getElementById('cs-name-a').textContent=data.names.a;
    document.getElementById('cs-name-b').textContent=data.names.b;
    document.getElementById('ws-team-badge').textContent=teamName;
    document.getElementById('ws-team-badge').className='ws-team t'+TEAM;
    const pb=document.getElementById('p-name-badge');
    pb.textContent=`${myName} — ${teamName}`;
    pb.className='p-name-badge t'+TEAM;
  }

  // Update couch dots
  if(data.players){
    ['a','b'].forEach(t=>{
      const players=data.players[t]||[];
      document.getElementById(`cs-dots-${t}`).innerHTML=
        players.map(p=>`<div class="dot t${t}${p.onCouch?' out':''}" title="${p.label}"></div>`).join('');
    });
  }

  if(data.phase==='idle'){
    phase='idle'; buzzLocked=false;
    const myPlayers=data.players&&data.players[TEAM];
    const me=myPlayers&&myPlayers.find(p=>p.playerName===myName||p.label===myName.slice(0,4));
    if(me&&me.onCouch){
      disableBuzz();
      setStatus('أنت على الكنبة — انتظر حتى يُرجعوك','');
    } else {
      enableBuzz();
      setStatus('جاهز! اضغط حين تعرف الجواب','ready');
    }
  } else if(data.phase==='buzzed'||data.phase==='action'){
    disableBuzz();
  }
}

function onBuzzed(data){
  if(data.gameId!==GAME_ID) return;
  phase='buzzed'; disableBuzz();
  if(data.team===TEAM&&data.name===myName){
    setStatus('ضغطت الجرس! انتظر المضيف...','buzzed-me');
  } else {
    setStatus(`${data.name} ضغط الجرس أولاً!`,'buzzed-other');
  }
}

function onAction(data){
  if(data.gameId!==GAME_ID) return;
  phase='idle'; buzzLocked=false;
  // onGameState will re-enable buzzer correctly based on couch status
}

function onNameTaken(data){
  if(data.gameId!==GAME_ID) return;
  if(data.playerId!==`${TEAM}-${myName}`) return;
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('waiting-screen').style.display='none';
  document.getElementById('player').style.display='none';
  document.getElementById('name-screen').style.display='flex';
  document.getElementById('ns-err').textContent='هذا الاسم مستخدم بالفعل في الفريق، اختر اسماً آخر.';
  if(channel) channel.unbind_all();
  if(pusher) pusher.disconnect();
  pusher=null; channel=null; myName='';
}

function onTeamFull(data){
  if(data.gameId!==GAME_ID) return;
  if(data.playerId!==`${TEAM}-${myName}`) return; // only for this specific player
  // Show error only on name screen, not as full page error
  document.getElementById('loading').style.display='none';
  document.getElementById('name-screen').style.display='flex';
  document.getElementById('ns-err').textContent='الفريق ممتلئ! جرب فريقاً آخر أو انتظر.';
  // Reset pusher
  if(channel) channel.unbind_all();
  if(pusher) pusher.disconnect();
  pusher=null; channel=null;
}

function onWin(data){
  if(data.gameId!==GAME_ID) return;
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('win-title').textContent=`${data.name} فاز!`;
  document.getElementById('win-sub').textContent='كل اللاعبين على الكنبة!';
  document.getElementById('win-screen').classList.add('show');
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

const buzzBtn=document.getElementById('buzz-btn');
buzzBtn.addEventListener('click',doBuzz);
buzzBtn.addEventListener('touchstart',e=>{e.preventDefault();doBuzz();},{passive:false});

function doBuzz(){
  if(buzzBtn.classList.contains('disabled')) return;
  if(phase!=='idle'||buzzLocked) return;
  buzzLocked=true; phase='buzzed';
  buzzBtn.classList.add('fired');
  disableBuzz();
  setStatus('ضغطت الجرس! انتظر المضيف...','buzzed-me');
  if(navigator.vibrate) navigator.vibrate([80,30,80]);
  notifyHost('buzz',{team:TEAM,name:myName,gameId:GAME_ID});
}

function enableBuzz(){
  buzzBtn.classList.remove('disabled','fired');
  document.getElementById('buzz-hint').textContent='اضغط بسرعة حين تعرف الجواب!';
}
function disableBuzz(){
  buzzBtn.classList.add('disabled');
  buzzBtn.classList.remove('fired');
  document.getElementById('buzz-hint').textContent='انتظر السؤال التالي...';
}
function setStatus(text,cls){
  const el=document.getElementById('status-bar');
  el.textContent=text;
  el.className='status-bar'+(cls?' '+cls:'');
}
function showError(msg){
  document.getElementById('name-screen').style.display='none';
  document.getElementById('loading').style.display='none';
  document.getElementById('waiting-screen').style.display='none';
  const e=document.getElementById('error');
  e.classList.add('show');
  document.getElementById('error-msg').textContent=msg;
}

// Set buzzer color
buzzBtn.classList.add('t'+TEAM);
</script>
</body>
</html>
