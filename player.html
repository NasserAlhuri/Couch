<script>
const params=new URLSearchParams(window.location.search);
const GAME_ID=params.get('game');
const TEAM=params.get('team');
const PUSHER_KEY=params.get('key');
const PUSHER_CLUSTER=params.get('cluster');

if(!GAME_ID||!TEAM||!PUSHER_KEY||!PUSHER_CLUSTER){
  showError('Invalid link. Please scan the QR code from the host screen again.');
}

let myName='';
let pusher=null, channel=null;
let phase='idle', buzzLocked=false;

const badge=document.getElementById('ns-team-badge');
badge.className='ns-team t'+TEAM;
badge.textContent=TEAM==='a'?'Team A':'Team B';

document.getElementById('join-btn').addEventListener('click',joinGame);
document.getElementById('player-name-input').addEventListener('keydown',e=>{if(e.key==='Enter') joinGame();});

function joinGame(){
  const name=document.getElementById('player-name-input').value.trim();
  if(!name){document.getElementById('ns-err').textContent='Please enter your name.';return;}
  if(name.length<2){document.getElementById('ns-err').textContent='Name too short.';return;}
  myName=name;
  document.getElementById('name-screen').style.display='none';
  document.getElementById('loading').style.display='flex';
  connectPusher();
}

function connectPusher(){
  try{
    pusher=new Pusher(PUSHER_KEY,{cluster:PUSHER_CLUSTER});
    pusher.connection.bind('connected',()=>{
      channel=pusher.subscribe(`game-${GAME_ID}`);
      channel.bind('game-state',onGameState);
      channel.bind('buzzed',onBuzzed);
      channel.bind('action',onAction);
      channel.bind('win',onWin);
      channel.bind('pusher:subscription_succeeded',()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('player').style.display='flex';
        const pb=document.getElementById('p-name-badge');
        pb.className='p-name-badge t'+TEAM;
        pb.textContent=myName;
        document.getElementById('buzz-btn').classList.add('t'+TEAM);
        setStatus('Connected! Waiting for question...','');
        setTimeout(()=>{
          notifyHost('join',{team:TEAM,name:myName,gameId:GAME_ID,playerId:`${TEAM}-${myName}`});
        },400);
      });
    });
    pusher.connection.bind('failed',()=>showError('Could not connect to game server.'));
    pusher.connection.bind('unavailable',()=>showError('Connection unavailable. Check your internet.'));
  }catch(e){showError('Failed to connect: '+e.message);}
}

async function notifyHost(event,data){
  try{
    await fetch('/api/pusher',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channel:`game-${GAME_ID}`,event,data})
    });
  }catch(e){console.warn('notify failed',e);}
}

function onGameState(data){
  if(data.gameId!==GAME_ID) return;
  if(data.currentQ) document.getElementById('q-display').textContent=data.currentQ;
  else document.getElementById('q-display').innerHTML='<span class="q-placeholder">Waiting for question...</span>';
  if(data.names){
    document.getElementById('cs-name-a').textContent=data.names.a;
    document.getElementById('cs-name-b').textContent=data.names.b;
  }
  if(data.players){
    ['a','b'].forEach(t=>{
      const players=data.players[t]||[];
      document.getElementById(`cs-dots-${t}`).innerHTML=
        players.map(p=>`<div class="dot t${t}${p.onCouch?' out':''}" title="${p.label}"></div>`).join('');
    });
  }
  if(data.phase==='idle'){
    phase='idle'; buzzLocked=false;
    const myPlayers=data.players&&data.players[TEAM];
    const me=myPlayers&&myPlayers.find(p=>p.playerName===myName);
    if(me&&me.onCouch){
      disableBuzz();
      setStatus('You are on the couch — wait to be brought back','');
    } else {
      enableBuzz();
      setStatus('Ready! Buzz when you know the answer.','ready');
    }
  } else if(data.phase==='buzzed'||data.phase==='action'){
    disableBuzz();
  }
}

function onBuzzed(data){
  if(data.gameId!==GAME_ID) return;
  phase='buzzed'; disableBuzz();
  if(data.team===TEAM&&data.name===myName){
    setStatus('You buzzed! Wait for the host...','buzzed-me');
  } else {
    setStatus(`${data.name} buzzed first!`,'buzzed-other');
  }
}

function onAction(data){
  if(data.gameId!==GAME_ID) return;
  phase='idle'; buzzLocked=false;
}

function onWin(data){
  if(data.gameId!==GAME_ID) return;
  document.getElementById('win-title').textContent=`${data.name} Wins!`;
  document.getElementById('win-sub').textContent='All players are on the couch!';
  document.getElementById('win-screen').classList.add('show');
}

const buzzBtn=document.getElementById('buzz-btn');
buzzBtn.addEventListener('click',doBuzz);
buzzBtn.addEventListener('touchstart',e=>{e.preventDefault();doBuzz();},{passive:false});

function doBuzz(){
  if(buzzBtn.classList.contains('disabled')) return;
  if(phase!=='idle'||buzzLocked) return;
  buzzLocked=true; phase='buzzed';
  buzzBtn.classList.add('fired');
  disableBuzz();
  setStatus('BUZZED! Waiting for host...','buzzed-me');
  if(navigator.vibrate) navigator.vibrate([80,30,80]);
  notifyHost('buzz',{team:TEAM,name:myName,gameId:GAME_ID});
}

function enableBuzz(){
  buzzBtn.classList.remove('disabled','fired');
  document.getElementById('buzz-hint').textContent='Tap fast when you know the answer!';
}

function disableBuzz(){
  buzzBtn.classList.add('disabled');
  buzzBtn.classList.remove('fired');
  document.getElementById('buzz-hint').textContent='Wait for next question...';
}

function setStatus(text,cls){
  const el=document.getElementById('status-bar');
  el.textContent=text;
  el.className='status-bar'+(cls?' '+cls:'');
}

function showError(msg){
  document.getElementById('name-screen').style.display='none';
  document.getElementById('loading').style.display='none';
  const e=document.getElementById('error');
  e.classList.add('show');
  document.getElementById('error-msg').textContent=msg;
}
</script>
