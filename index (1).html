<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Couch Challenge — Buzzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#E24B4A;--red-l:#FCEBEB;--red-d:#A32D2D;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-d:#185FA5;
  --gold:#EF9F27;--gold-l:#FAEEDA;
  --bg:#0f0f0f;--card:#1a1a1a;--border:#333;
  --text:#f0f0f0;--muted:#888;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  touch-action:none;
}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:2rem;
}
.load-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px;color:var(--gold)}
.load-sub{color:var(--muted);margin:.5rem 0 1.5rem}
.load-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN BUZZER SCREEN ── */
#player{display:none;width:100%;height:100%;flex-direction:column;align-items:center}

.p-header{
  width:100%;padding:1rem 1.25rem .75rem;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.p-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--gold)}
.p-team{font-size:.8rem;font-weight:700;padding:.3rem .7rem;border-radius:20px}
.p-team.ta{background:var(--red-l);color:var(--red-d)}
.p-team.tb{background:var(--blue-l);color:var(--blue-d)}

/* ── STATUS BAR ── */
.status-bar{
  width:100%;padding:.6rem 1.25rem;
  background:var(--card);border-bottom:1px solid var(--border);
  text-align:center;font-size:.85rem;color:var(--muted);
  flex-shrink:0;min-height:42px;
  display:flex;align-items:center;justify-content:center;
}
.status-bar.alert{background:var(--gold);color:#000;font-weight:700}
.status-bar.buzzed-me{background:#1c3a0a;color:#9fce60}
.status-bar.buzzed-other{background:#2a1010;color:var(--red)}

/* ── QUESTION ── */
.q-area{
  width:100%;padding:.75rem 1.25rem;text-align:center;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  min-height:80px;display:flex;align-items:center;justify-content:center;
}
.q-txt{font-size:1rem;font-weight:500;line-height:1.5;color:var(--text)}
.q-placeholder{color:var(--muted);font-size:.9rem}

/* ── BUZZER BUTTON ── */
.buzzer-area{
  flex:1;width:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1.5rem;
  gap:1rem;
}

.buzz-btn{
  width:min(260px, 72vw);
  height:min(260px, 72vw);
  border-radius:50%;border:none;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem, 7vw, 2.5rem);
  letter-spacing:3px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s, box-shadow .1s;
  position:relative;overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
.buzz-btn.ta{
  background:radial-gradient(circle at 35% 35%, #f07070, var(--red) 60%, var(--red-d));
  box-shadow:0 0 0 8px rgba(226,75,74,.15), 0 8px 32px rgba(226,75,74,.4);
}
.buzz-btn.tb{
  background:radial-gradient(circle at 35% 35%, #70a8f0, var(--blue) 60%, var(--blue-d));
  box-shadow:0 0 0 8px rgba(55,138,221,.15), 0 8px 32px rgba(55,138,221,.4);
}
.buzz-btn:active{transform:scale(.93);box-shadow:none}
.buzz-btn.disabled{filter:grayscale(.7);opacity:.5;pointer-events:none;cursor:not-allowed}
.buzz-btn.fired{transform:scale(1.06)}
.buzz-btn.ta.fired{box-shadow:0 0 0 20px rgba(226,75,74,.25), 0 12px 48px rgba(226,75,74,.6)}
.buzz-btn.tb.fired{box-shadow:0 0 0 20px rgba(55,138,221,.25), 0 12px 48px rgba(55,138,221,.6)}

.buzz-hint{font-size:.8rem;color:var(--muted);text-align:center}

/* ── COUCH STATUS ── */
.couch-strip{
  width:100%;padding:.75rem 1.25rem;
  border-top:1px solid var(--border);background:var(--card);
  flex-shrink:0;
}
.couch-header{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem}
.couch-teams{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.couch-team{font-size:.8rem}
.couch-team-name{font-weight:700;font-size:.7rem;margin-bottom:.2rem}
.ct-a .couch-team-name{color:var(--red)}
.ct-b .couch-team-name{color:var(--blue)}
.dots{display:flex;flex-wrap:wrap;gap:.25rem}
.dot{width:14px;height:14px;border-radius:50%;border:1.5px solid}
.dot.ta{background:var(--red-l);border-color:var(--red)}
.dot.ta.couch{opacity:.35;background:transparent;border-style:dashed}
.dot.tb{background:var(--blue-l);border-color:var(--blue)}
.dot.tb.couch{opacity:.35;background:transparent;border-style:dashed}

/* ── WIN SCREEN ── */
#win-screen{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.95);flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:2rem;
}
#win-screen.show{display:flex}
#win-screen h1{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:3px;color:var(--gold);margin-bottom:.5rem}
#win-screen p{color:var(--muted);font-size:1rem}

/* ── ERROR ── */
#error{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;text-align:center;padding:2rem;flex-direction:column;gap:.75rem}
#error.show{display:flex}
#error h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--red)}
#error p{color:var(--muted);font-size:.9rem;max-width:320px}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">🛋️ Couch</div>
  <p class="load-sub">Connecting to game...</p>
  <div class="load-spinner"></div>
</div>

<div id="player">
  <div class="p-header">
    <div class="p-logo">CouchChallenge</div>
    <div class="p-team" id="team-badge">Team</div>
  </div>
  <div class="status-bar" id="status-bar">Waiting for host...</div>
  <div class="q-area">
    <div class="q-txt" id="q-display"><span class="q-placeholder">Question will appear here</span></div>
  </div>
  <div class="buzzer-area">
    <button class="buzz-btn disabled" id="buzz-btn" aria-label="Buzz in">BUZZ!</button>
    <div class="buzz-hint" id="buzz-hint">Wait for the question...</div>
  </div>
  <div class="couch-strip">
    <div class="couch-header">Game Status</div>
    <div class="couch-teams">
      <div class="couch-team ct-a">
        <div class="couch-team-name" id="cs-name-a">Team A</div>
        <div class="dots" id="cs-dots-a"></div>
      </div>
      <div class="couch-team ct-b">
        <div class="couch-team-name" id="cs-name-b">Team B</div>
        <div class="dots" id="cs-dots-b"></div>
      </div>
    </div>
  </div>
</div>

<div id="win-screen">
  <h1 id="win-title">🏆</h1>
  <p id="win-sub">Game over!</p>
</div>

<div id="error">
  <h2>Oops!</h2>
  <p id="error-msg">Could not connect to game. Make sure you scanned the right QR code and the host screen is open.</p>
</div>

<script>
// ── PARSE URL PARAMS ──
const params = new URLSearchParams(window.location.search);
const gameId = params.get('game');
const team = params.get('team'); // 'a' or 'b'

if(!gameId || !team){
  showError("No game ID found. Please scan the QR code from the host screen.");
}

let channel = null;
let phase = 'idle';
let myTeam = team;
let names = {a:'Team A', b:'Team B'};
let buzzLocked = false;

function showError(msg){
  document.getElementById('loading').style.display = 'none';
  const e = document.getElementById('error');
  e.classList.add('show');
  document.getElementById('error-msg').textContent = msg;
}

function init(){
  // Load state from host
  const raw = localStorage.getItem('cc_state');
  if(raw){
    try{
      const s = JSON.parse(raw);
      if(s.gameId === gameId){
        names = s.names || names;
        applyState(s);
        connectChannel();
        return;
      }
    }catch(e){}
  }
  // Retry a few times then error
  let tries = 0;
  const iv = setInterval(()=>{
    tries++;
    const r2 = localStorage.getItem('cc_state');
    if(r2){
      try{
        const s = JSON.parse(r2);
        if(s.gameId === gameId){
          names = s.names || names;
          applyState(s);
          connectChannel();
          clearInterval(iv);
          return;
        }
      }catch(e){}
    }
    if(tries > 20) { clearInterval(iv); showError("Host screen not found. Make sure the host has started the game."); }
  }, 300);
}

function connectChannel(){
  channel = new BroadcastChannel(`cc_${gameId}`);
  channel.onmessage = onHostMsg;

  // Also listen localStorage for cross-tab
  window.addEventListener('storage', e=>{
    if(e.key === 'cc_state'){
      try{
        const s = JSON.parse(e.newValue);
        if(s.gameId === gameId) applyState(s);
      }catch(err){}
    }
    if(e.key === 'cc_msg'){
      try{
        const m = JSON.parse(e.newValue);
        onHostMsg({data: m});
      }catch(err){}
    }
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('player').style.display = 'flex';
}

function onHostMsg(e){
  const {type, team: t, name, action} = e.data || {};
  if(type === 'READY'){
    phase = 'idle';
    buzzLocked = false;
    setStatus('Ready! Buzz when you know the answer.', '');
    enableBuzz();
    const raw = localStorage.getItem('cc_state');
    if(raw){ try{ applyState(JSON.parse(raw)); }catch(err){} }
  }
  if(type === 'BUZZED'){
    phase = 'buzzed';
    disableBuzz();
    if(t === myTeam){
      setStatus('🎉 Your team buzzed!', 'buzzed-me');
    } else {
      setStatus(`⚡ ${name} buzzed first!`, 'buzzed-other');
    }
  }
  if(type === 'ACTION'){
    phase = 'idle';
    const raw = localStorage.getItem('cc_state');
    if(raw){ try{ applyState(JSON.parse(raw)); }catch(err){} }
  }
  if(type === 'WIN'){
    document.getElementById('win-title').textContent = `${name} Wins! 🏆`;
    document.getElementById('win-sub').textContent = 'All players are on the couch!';
    document.getElementById('win-screen').classList.add('show');
  }
}

function applyState(s){
  names = s.names || names;
  document.getElementById('team-badge').textContent = names[myTeam] || (myTeam==='a'?'Team A':'Team B');
  document.getElementById('team-badge').className = 'p-team t'+myTeam;
  document.getElementById('cs-name-a').textContent = names.a;
  document.getElementById('cs-name-b').textContent = names.b;

  // Buzz button color
  const btn = document.getElementById('buzz-btn');
  btn.className = btn.className.replace(/\b(ta|tb)\b/g,'');
  btn.classList.add('buzz-btn', 't'+myTeam);

  // Question
  if(s.currentQ) document.getElementById('q-display').textContent = s.currentQ;

  // Status dots
  if(s.players){
    ['a','b'].forEach(t=>{
      const cls = 't'+t;
      const players = s.players[t] || [];
      document.getElementById(`cs-dots-${t}`).innerHTML =
        players.map(p=>`<div class="dot ${cls}${p.onCouch?' couch':''}" title="${p.label}"></div>`).join('');
    });
  }

  // Phase
  if(s.phase === 'idle'){
    enableBuzz();
    setStatus('Ready! Buzz when you know the answer.', '');
  } else if(s.phase === 'buzzed' || s.phase === 'action'){
    disableBuzz();
    setStatus(s.buzzedTeam === myTeam ? '🎉 Your team buzzed!' : '⚡ Other team buzzed!',
              s.buzzedTeam === myTeam ? 'buzzed-me' : 'buzzed-other');
  } else if(s.phase === 'done'){
    disableBuzz();
  }
}

function setStatus(text, cls){
  const el = document.getElementById('status-bar');
  el.textContent = text;
  el.className = 'status-bar' + (cls?' '+cls:'');
}

function enableBuzz(){
  if(buzzLocked) return;
  const btn = document.getElementById('buzz-btn');
  btn.classList.remove('disabled','fired');
  document.getElementById('buzz-hint').textContent = 'Tap fast!';
}

function disableBuzz(){
  const btn = document.getElementById('buzz-btn');
  btn.classList.add('disabled');
  btn.classList.remove('fired');
  document.getElementById('buzz-hint').textContent = 'Wait for next question...';
}

// ── BUZZ HANDLER ──
document.getElementById('buzz-btn').addEventListener('click', doBuzz);
document.getElementById('buzz-btn').addEventListener('touchstart', e=>{ e.preventDefault(); doBuzz(); }, {passive:false});

function doBuzz(){
  const btn = document.getElementById('buzz-btn');
  if(btn.classList.contains('disabled')) return;
  if(phase !== 'idle') return;
  buzzLocked = true;
  phase = 'buzzed';
  disableBuzz();
  btn.classList.add('fired');
  setStatus('🔔 BUZZED! Waiting for host...', 'alert');

  // Notify host
  if(channel) channel.postMessage({type:'BUZZ', team: myTeam, gameId});
  localStorage.setItem(`cc_buzz_${gameId}`, JSON.stringify({team: myTeam, ts: Date.now()}));

  // Haptic feedback
  if(navigator.vibrate) navigator.vibrate([80, 30, 80]);
}

// ── BOOT ──
init();
</script>
</body>
</html>
